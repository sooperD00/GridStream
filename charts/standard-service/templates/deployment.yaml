apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "standard-service.fullname" . }}
  labels:
    {{- include "standard-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      {{- include "standard-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "standard-service.labels" . | nindent 8 }}
      {{- if .Values.config }}
      annotations:
        # Roll pods automatically when ConfigMap content changes — without
        # this, kubectl wouldn't restart pods on a values.yaml-only edit.
        checksum/config: {{ .Values.config | toYaml | sha256sum }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ required "app.name is required (set via -f values-myservice.yaml or --set)" .Values.app.name }}
          image: "{{ required "image.repository is required (set via -f values-myservice.yaml or --set)" .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if .Values.config }}
          envFrom:
            - configMapRef:
                name: {{ include "standard-service.fullname" . }}-config
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.deployment.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
