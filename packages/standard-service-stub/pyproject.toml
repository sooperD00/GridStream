[project]
name = "gridstream-standard-service-stub"
version = "0.1.0"
description = "GridStream paved-road exemplar service. Proves the chart and reusable workflow function end-to-end."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "GridStream Platform Team" }]
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "pydantic",
]

[project.scripts]
standard-service-stub = "standard_service_stub.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/standard_service_stub"]
