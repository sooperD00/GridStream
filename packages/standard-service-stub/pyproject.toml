[project]
name = "gridstream-standard-service-stub"
version = "0.1.0"
description = "GridStream paved-road exemplar service. Proves the chart and reusable workflow function end-to-end."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "N.L. Rowsey", email = "nicole.rowsey@gmail.com" }]
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "pydantic",
]

[project.scripts]
standard-service-stub = "standard_service_stub.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/standard_service_stub"]

[tool.mypy]
# Mypy reads the pyproject.toml of the directory it's invoked from.
# CI runs mypy with working-directory at this member, so the strict
# config lives here, not at workspace root. Future workspace members
# (producer, consumer) declare their own [tool.mypy] blocks for the
# same reason. See ADR-0010 for workspace-shape rationale.
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_return_any = true

[[tool.mypy.overrides]]
# Tests use patterns that strict mypy rejects: pytest fixtures with
# untyped returns, parametrize argument inference, monkeypatch, mocks.
# Strict everywhere except tests is the convention; relax just enough
# that fixture-heavy test code doesn't get a red CI for shape, not bugs.
module = "tests.*"
disallow_untyped_decorators = false
disallow_untyped_defs = false
disallow_incomplete_defs = false

[tool.coverage.report]
# Stated coverage standard. The reusable CI workflow passes
# --cov-fail-under=80 explicitly, and pytest-cov's CLI flag wins over
# this file — so the workflow, not this section, is what actually gates
# CI. This section exists to make the standard source-controlled and
# visible at PR review, rather than living only in CI configuration.
fail_under = 80
show_missing = true
